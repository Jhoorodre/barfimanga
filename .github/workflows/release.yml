name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  ci:
    name: Fmt + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Permissão do script
        run: chmod +x scripts/build.sh
      - name: CI via build.sh
        run: ./scripts/build.sh

  release:
    name: Build binários e publicar release
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: barfimanga-linux-amd64
          - goos: linux
            goarch: arm64
            asset: barfimanga-linux-arm64
          - goos: windows
            goarch: amd64
            asset: barfimanga-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ${{ matrix.asset }} ./cmd/barfimanga
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    name: Publicar release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Criar ou atualizar release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Última versão (main)"
          body: "Build automático a partir do commit ${{ github.sha }}."
          files: dist/*
          prerelease: true
